<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Office</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    #app {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      background: #1a1a2e; color: #e0e0e0;
      font-family: "Courier New", Consolas, monospace;
    }

    #main-area {
      flex: 1; display: flex; flex-direction: row; overflow: hidden;
    }

    #canvas-container {
      flex: 0 0 420px; min-width: 200px;
      position: relative; overflow: hidden;
    }
    #canvas-container canvas {
      display: block; width: 100%; height: 100%;
    }

    /* ---- Splitter ---- */
    #splitter {
      flex: 0 0 5px; background: #2a2a44; cursor: col-resize;
      transition: background 0.15s;
    }
    #splitter:hover, #splitter.dragging { background: #3498db; }

    /* ---- Side Panel ---- */
    #side-panel {
      flex: 1; min-width: 200px; background: #16162a;
      display: flex; flex-direction: column; overflow: hidden;
    }

    .panel-section { display: flex; flex-direction: column; overflow: hidden; }

    .panel-section-body {
      flex: 1; overflow-y: auto; padding: 6px 10px;
    }
    .panel-section.collapsed .panel-section-body { display: none; }

    .panel-section-header {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 12px; cursor: pointer; user-select: none;
      background: #1e1e36; border-bottom: 1px solid #2a2a44;
      font-size: 11px; font-weight: bold; letter-spacing: 1px;
      color: #8888aa; text-transform: uppercase;
    }
    .panel-section-header:hover { background: #252544; }
    .panel-section-header .chevron {
      font-size: 9px; transition: transform 0.15s;
    }
    .panel-section.collapsed .chevron { transform: rotate(-90deg); }
    .panel-section-body::-webkit-scrollbar { width: 5px; }
    .panel-section-body::-webkit-scrollbar-track { background: transparent; }
    .panel-section-body::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    /* Task board */
    .task-group-label {
      font-size: 10px; color: #666688; text-transform: uppercase;
      letter-spacing: 0.5px; margin: 8px 0 4px; padding-bottom: 2px;
      border-bottom: 1px solid #2a2a44;
    }
    .task-item {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 0; font-size: 12px;
    }
    .task-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }
    .task-title { flex: 1; overflow: hidden; word-break: break-word; }
    .task-assignee { font-size: 10px; color: #666688; }
    .task-empty { font-size: 11px; color: #444466; font-style: italic; padding: 8px 0; }

    /* Agent log */
    .log-entry {
      display: flex; flex-wrap: wrap; gap: 4px 6px; padding: 3px 0;
      font-size: 11px; line-height: 1.4; border-bottom: 1px solid #1a1a30;
    }
    .log-time { color: #555577; flex-shrink: 0; font-size: 10px; }
    .log-agent { font-weight: bold; flex-shrink: 0; }
    .log-role { color: #777799; font-size: 9px; flex-shrink: 0; opacity: 0.7; }
    .log-detail { color: #aaaacc; word-break: break-word; min-width: 0; }

    /* File changes */
    .file-entry {
      display: flex; align-items: center; gap: 6px;
      padding: 3px 0; font-size: 11px;
    }
    .file-icon { flex-shrink: 0; font-size: 12px; }
    .file-path { color: #8888bb; overflow: hidden; word-break: break-all; min-width: 0; }

    /* ---- Command Bar ---- */
    #command-bar {
      height: 50px; background: #12122a;
      border-top: 1px solid #333;
      display: flex; align-items: center;
      padding: 0 16px;
    }
    #prompt-indicator {
      color: #2ecc71; margin-right: 8px; font-size: 16px;
    }
    #command-input {
      flex: 1; background: transparent; border: none;
      color: #e0e0e0; font-family: "Courier New", Consolas, monospace;
      font-size: 14px; outline: none;
    }
    #command-input::placeholder { color: #444466; }
    #command-input:disabled { opacity: 0.5; }
  </style>
</head>
<body>
  <div id="app">
    <div id="main-area">
      <div id="canvas-container"></div>
      <div id="splitter"></div>
      <div id="side-panel"></div>
    </div>
    <div id="command-bar">
      <span id="prompt-indicator">&#9654;</span>
      <input id="command-input" type="text" placeholder="Enter project path to connect (e.g., /Users/you/project)..." />
      <button type="button" id="abort-btn" style="display:none; background:#e74c3c; color:#fff; border:none; padding:4px 10px; margin-left:8px; font-family:inherit; font-size:12px; cursor:pointer; border-radius:3px;">&#10005; Abort</button>
    </div>
  </div>
  <script type="module" src="bundle.js"></script>
</body>
</html>
